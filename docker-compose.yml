services:
  redis:
    image: redis:7-alpine

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 15s

  vote:
    build: ./vote
    ports:
      - "5000:80"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  result:
    build: ./result
    ports:
      - "5001:80"
    environment:
      DB_HOST: db
      POSTGRES_PASSWORD: example
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./worker
    environment:
      REDIS_URL: redis://redis:6379
      DB_HOST: db
      POSTGRES_PASSWORD: example
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy

volumes:
  pgdata:
