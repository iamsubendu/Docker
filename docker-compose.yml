services:
  redis:
    image: redis:7-alpine

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  vote:
    build: ./vote
    ports:
      - "5000:80"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  result:
    build: ./result
    ports:
      - "5001:80"
    environment:
      DB_HOST: db
      POSTGRES_PASSWORD: example
    depends_on:
      - db

  worker:
    build: ./worker
    environment:
      REDIS_URL: redis://redis:6379
      DB_HOST: db
      POSTGRES_PASSWORD: example
    depends_on:
      - redis
      - db

volumes:
  pgdata:
