<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vote — Cats vs Dogs</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      button {
        font-size: 1.1rem;
        padding: 0.75rem 1.5rem;
        margin: 0.5rem;
        cursor: pointer;
      }
      #msg {
        margin-top: 1rem;
        color: #0a0;
      }
    </style>
  </head>
  <body>
    <h1>Cats vs Dogs</h1>
    <p>Click a button to vote. Your vote goes to Redis, then the worker saves it to PostgreSQL.</p>
    <div>
      <button type="button" onclick="vote('cats')">Cats</button>
      <button type="button" onclick="vote('dogs')">Dogs</button>
    </div>
    <p id="msg"></p>
    <p><a href="http://localhost:5001" target="_blank" rel="noopener">Open results page</a></p>
    <script>
      async function vote(choice) {
        const msg = document.getElementById("msg");
        msg.textContent = "Sending…";
        try {
          const r = await fetch("/vote", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ choice }),
          });
          const j = await r.json();
          msg.textContent = j.ok ? "Thanks! Vote queued in Redis." : (j.error || "Error");
        } catch (e) {
          msg.textContent = "Network error";
        }
      }
    </script>
  </body>
</html>
